name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - run: npm test
      - run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
      
  deploy:
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ''), '#skip') }}
    needs: [build_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}

  tag_release:
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ''), '#skip') }}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         DEFAULT_BUMP: patch
         TAG_PREFIX: v

  notify_success:
    if: ${{ success()}}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          color: 0x00FF87
          title: "🚀 ${{ github.repository }} deployed!"
          description: |
            **Author:**  ${{github.actor}}
            **Message:** ${{github.event.head_commit.message}}
            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          username: "CI bot"

  notify_failure:
    if: ${{ failure()}}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "🤕 Build failed"
          color: 0xFF006E
          description: |
            **Repository:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            **Branch:** `${{ github.ref_name }}`
            **Trigger:** ${{ github.event_name }} by [${{ github.actor }}](https://github.com/${{ github.actor }})
            **Commit:**  `${{ github.sha }}`
            **Message:** ${{ github.event.head_commit.message }}

            [View Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) • [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          username: "CI bot"